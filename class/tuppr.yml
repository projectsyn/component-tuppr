parameters:
  kapitan:
    dependencies:
      - type: helm
        source: ${tuppr:charts:tuppr:source}
        version: ${tuppr:charts:tuppr:version}
        chart_name: tuppr
        output_path: ${_base_directory}/helmcharts/tuppr/${tuppr:charts:tuppr:version}
    compile:
      - input_paths:
          - ${_base_directory}/component/app.jsonnet
        input_type: jsonnet
        output_path: .
      - input_paths:
          - ${_base_directory}/component/main.jsonnet
        input_type: jsonnet
        output_path: tuppr/
      # tuppr Helm chart
      - input_paths:
          - ${_base_directory}/helmcharts/tuppr/${tuppr:charts:tuppr:version}
        input_type: helm
        helm_values: ${tuppr:helm_values}
        helm_params:
          name: tuppr
          namespace: ${tuppr:namespace:name}
        output_path: tuppr/01_helm_chart
