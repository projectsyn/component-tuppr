apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: tuppr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tuppr
    app.kubernetes.io/version: 0.1.25
    helm.sh/chart: tuppr-0.1.25
  name: tuppr
  namespace: syn-tuppr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: tuppr
      app.kubernetes.io/name: tuppr
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: tuppr
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: tuppr
        app.kubernetes.io/version: 0.1.25
        helm.sh/chart: tuppr-0.1.25
    spec:
      containers:
        - args:
            - --log-level=debug
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --talosconfig-secret=tuppr-talosconfig
            - --metrics-secure=false
            - --metrics-service-name=tuppr-metrics-service
            - --webhook-config-name=tuppr-validating-webhook
            - --webhook-service-name=tuppr-webhook-service
            - --webhook-secret-name=tuppr-webhook-server-cert
          command:
            - /manager
          env:
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTROLLER_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          image: ghcr.io/home-operations/tuppr:0.1.25
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
            - mountPath: /var/run/secrets/talos.dev
              name: talosconfig
              readOnly: true
      enableServiceLinks: false
      priorityClassName: system-node-critical
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: tuppr
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: tuppr-webhook-server-cert
        - name: talosconfig
          secret:
            defaultMode: 420
            secretName: tuppr-talosconfig
